<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Audaz Pro</title>
    <meta name="description" content="Audaz Pro ticket dashboard">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=DM+Sans:wght@400;500;600;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/tickets.css">

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="../images/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="../images/favicon-16x16.png">
</head>
<body class="audaz-body">
    <!-- Header -->
    <header class="site-header">
        <div class="container">
            <div class="header-grid">
                <a href="/client/dashboard.html" class="logo-link">
                    <img src="../images/66943b1c1348ffa2b811c19c_Audaz Black.png" alt="Audaz Pro" class="logo-image">
                </a>
                <nav class="nav">
                    <ul class="nav-menu">
                        <li><a href="/client/dashboard.html" class="nav-link active">Dashboard</a></li>
                        <li><a href="/client/tickets/index.html" class="nav-link">Tickets</a></li>
                        <li><a href="/client/settings/team.html" class="nav-link">Team</a></li>
                    </ul>
                    <div class="user-menu">
                        <div class="user-avatar"></div>
                        <span class="user-name">Loading...</span>
                        <button class="logout-btn btn btn-secondary">Log Out</button>
                    </div>
                </nav>
                <button class="mobile-toggle" aria-label="Menu">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
            </div>
        </div>
    </header>

    <main>
        <!-- Dashboard Header -->
        <section class="dashboard-header">
            <div class="container">
                <div class="dashboard-header-content">
                    <div class="dashboard-welcome">
                        <h1>Dashboard</h1>
                        <p class="user-org">Loading organization...</p>
                    </div>
                    <a href="/client/tickets/new.html" class="btn btn-primary">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                            <line x1="12" y1="5" x2="12" y2="19"/>
                            <line x1="5" y1="12" x2="19" y2="12"/>
                        </svg>
                        Open Ticket
                    </a>
                </div>
            </div>
        </section>

        <!-- Task Usage Banner (shown when remaining ≤ 2) -->
        <section id="usage-banner" style="display:none;">
            <div class="container">
                <div id="usage-banner-inner" class="usage-banner"></div>
            </div>
        </section>

        <!-- Buy Extra Tasks Modal -->
        <div id="buy-tasks-modal" class="modal-overlay" style="display:none;">
            <div class="modal-container" style="max-width:420px;">
                <div class="modal-header">
                    <h3 class="modal-title">Buy Extra Tasks</h3>
                    <button class="modal-close" id="close-buy-modal" aria-label="Close">&times;</button>
                </div>
                <div class="modal-body">
                    <p style="color:var(--color-text-secondary,#6b7280);margin:0 0 20px;font-size:14px;line-height:1.6;">
                        Extra tasks never expire — they're consumed after your monthly allocation runs out.
                    </p>
                    <div style="margin-bottom:20px;">
                        <label class="form-label" for="task-quantity">Number of tasks</label>
                        <input
                            type="number"
                            id="task-quantity"
                            class="form-input"
                            min="1"
                            max="500"
                            value="10"
                            placeholder="e.g. 10"
                            style="font-size:18px;font-weight:600;text-align:center;"
                        >
                    </div>
                    <div id="buy-tasks-error" style="display:none;color:#ef4444;font-size:13px;margin-bottom:12px;"></div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" id="cancel-buy-modal">Cancel</button>
                    <button class="btn btn-primary" id="confirm-buy-tasks">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
                            <rect x="1" y="4" width="22" height="16" rx="2" ry="2"/>
                            <line x1="1" y1="10" x2="23" y2="10"/>
                        </svg>
                        Proceed to Checkout
                    </button>
                </div>
            </div>
        </div>

        <!-- Stats Section -->
        <section class="dashboard-stats">
            <div class="container">
                <div class="stats-grid" id="stats-container">
                    <div class="stats-card stats-open">
                        <div class="stats-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="12" cy="12" r="10"/>
                                <path d="M12 6v6l4 2"/>
                            </svg>
                        </div>
                        <div class="stats-content">
                            <span class="stats-value" id="stat-open">-</span>
                            <span class="stats-label">Open</span>
                        </div>
                    </div>
                    <div class="stats-card stats-progress">
                        <div class="stats-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M12 2v4m0 12v4M4.93 4.93l2.83 2.83m8.48 8.48l2.83 2.83M2 12h4m12 0h4M4.93 19.07l2.83-2.83m8.48-8.48l2.83-2.83"/>
                            </svg>
                        </div>
                        <div class="stats-content">
                            <span class="stats-value" id="stat-progress">-</span>
                            <span class="stats-label">In Progress</span>
                        </div>
                    </div>
                    <div class="stats-card stats-done">
                        <div class="stats-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                                <polyline points="22 4 12 14.01 9 11.01"/>
                            </svg>
                        </div>
                        <div class="stats-content">
                            <span class="stats-value" id="stat-done">-</span>
                            <span class="stats-label">Done</span>
                        </div>
                    </div>
                    <div class="stats-card stats-total">
                        <div class="stats-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M15 5v2m0 4v2m0 4v2M5 5a2 2 0 0 0-2 2v3a2 2 0 1 1 0 4v3a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-3a2 2 0 1 1 0-4V7a2 2 0 0 0-2-2H5z"/>
                            </svg>
                        </div>
                        <div class="stats-content">
                            <span class="stats-value" id="stat-total">-</span>
                            <span class="stats-label">Total</span>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Recent Tickets -->
        <section class="dashboard-recent">
            <div class="container">
                <div class="section-header-row">
                    <h2>Recent Tickets</h2>
                    <a href="/client/tickets/index.html" class="btn btn-secondary">View All</a>
                </div>
                <div class="ticket-list" id="recent-tickets">
                    <div class="loading-state">
                        <div class="loading-spinner"></div>
                        <p>Loading tickets...</p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="site-footer site-footer-app">
        <div class="container">
            <div class="footer-bottom">
                <img src="../images/66943b1c1348ffa2b811c19c_Audaz Black.png" alt="Audaz Pro" class="footer-logo-img">
            </div>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase-config.js"></script>
    <script src="../js/services/auth.service.js"></script>
    <script src="../js/services/tickets.service.js"></script>
    <script src="../js/services/comments.service.js"></script>
    <script src="../js/services/invitations.service.js"></script>
    <script src="../js/components/ui.components.js"></script>
    <script src="../js/components/auth-guard.js"></script>
    <script>
        let currentOrgId = null;

        document.addEventListener('DOMContentLoaded', async function() {
            // Auth guard - require client roles
            const profile = await AuthGuard.init({
                requiredRoles: ['client_admin', 'client_user'],
                redirectTo: '/client/index.html'
            });

            if (!profile) return;

            currentOrgId = profile.org_id;

            // Update UI with user info
            AuthGuard.updateUserInfo(profile);
            AuthGuard.setupLogoutButton();

            // Mobile menu toggle
            const mobileToggle = document.querySelector('.mobile-toggle');
            const nav = document.querySelector('.nav');
            if (mobileToggle && nav) {
                mobileToggle.addEventListener('click', () => {
                    nav.classList.toggle('active');
                });
            }

            // Load data
            loadStats();
            loadRecentTickets();
            loadUsageBanner();

            // Buy tasks modal wiring
            document.getElementById('close-buy-modal').addEventListener('click', closeBuyModal);
            document.getElementById('cancel-buy-modal').addEventListener('click', closeBuyModal);
            document.getElementById('confirm-buy-tasks').addEventListener('click', startCheckout);
            document.getElementById('buy-tasks-modal').addEventListener('click', function(e) {
                if (e.target === this) closeBuyModal();
            });
        });

        async function loadStats() {
            const result = await TicketsService.getStats();

            if (result.success) {
                document.getElementById('stat-open').textContent = result.stats.open;
                document.getElementById('stat-progress').textContent = result.stats.in_progress;
                document.getElementById('stat-done').textContent = result.stats.done;
                document.getElementById('stat-total').textContent = result.stats.total;
            }
        }

        async function loadRecentTickets() {
            const container = document.getElementById('recent-tickets');
            const result = await TicketsService.getRecent(5);

            if (!result.success) {
                UIComponents.showError(result.error);
                container.innerHTML = '<p class="error-message">Error loading tickets</p>';
                return;
            }

            if (result.tickets.length === 0) {
                UIComponents.showEmptyState(container, {
                    icon: 'ticket',
                    title: 'No tickets yet',
                    message: 'You have not opened any tickets yet. Click the button above to create one.',
                    actionText: 'Open Ticket',
                    actionHandler: () => window.location.href = '/client/tickets/new.html'
                });
                return;
            }

            container.innerHTML = result.tickets
                .map(ticket => UIComponents.createTicketListItem(ticket))
                .join('');
        }

        async function loadUsageBanner() {
            if (!currentOrgId) return;

            const result = await TicketsService.getMonthlyUsage(currentOrgId);
            if (!result.success) return;

            const { remaining, limit, used, extra_tasks } = result.usage;
            const totalAvailable = remaining + (extra_tasks || 0);

            const banner = document.getElementById('usage-banner');
            const bannerInner = document.getElementById('usage-banner-inner');

            if (totalAvailable > 2) return; // No banner needed

            if (totalAvailable === 0) {
                // No tasks at all
                bannerInner.innerHTML = `
                    <div class="usage-banner-content usage-banner-critical">
                        <div class="usage-banner-text">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                                <circle cx="12" cy="12" r="10"/>
                                <line x1="12" y1="8" x2="12" y2="12"/>
                                <line x1="12" y1="16" x2="12.01" y2="16"/>
                            </svg>
                            <span>You have <strong>no tasks remaining</strong> this month. Purchase extra tasks to keep submitting requests.</span>
                        </div>
                        <button class="btn btn-primary btn-sm" onclick="openBuyModal()">Buy Tasks</button>
                    </div>
                `;
            } else {
                // Low tasks (1 or 2)
                bannerInner.innerHTML = `
                    <div class="usage-banner-content usage-banner-warning">
                        <div class="usage-banner-text">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                                <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
                                <line x1="12" y1="9" x2="12" y2="13"/>
                                <line x1="12" y1="17" x2="12.01" y2="17"/>
                            </svg>
                            <span>Only <strong>${totalAvailable} task${totalAvailable === 1 ? '' : 's'} remaining</strong> this month. Stock up before you run out.</span>
                        </div>
                        <button class="btn btn-secondary btn-sm" onclick="openBuyModal()">Buy More</button>
                    </div>
                `;
            }

            banner.style.display = 'block';
        }

        function openBuyModal() {
            document.getElementById('buy-tasks-error').style.display = 'none';
            document.getElementById('task-quantity').value = '10';
            document.getElementById('buy-tasks-modal').style.display = 'flex';
        }

        function closeBuyModal() {
            document.getElementById('buy-tasks-modal').style.display = 'none';
        }

        async function startCheckout() {
            const btn = document.getElementById('confirm-buy-tasks');
            const errorEl = document.getElementById('buy-tasks-error');
            const quantity = parseInt(document.getElementById('task-quantity').value, 10);

            errorEl.style.display = 'none';

            if (!quantity || quantity < 1 || quantity > 500) {
                errorEl.textContent = 'Please enter a quantity between 1 and 500.';
                errorEl.style.display = 'block';
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Redirecting...';

            try {
                const client = AudazSupabase.getClient();
                const session = await AudazSupabase.getCurrentSession();

                if (!session) {
                    throw new Error('Session expired — please refresh the page and try again.');
                }

                const { data, error } = await client.functions.invoke('create-checkout-session', {
                    body: { quantity },
                    headers: { Authorization: `Bearer ${session.access_token}` }
                });

                // Extract actual error message from the function response body
                if (error) {
                    let detail = error.message;
                    try {
                        const body = await error.context?.json?.();
                        if (body?.error) detail = body.error;
                    } catch {}
                    throw new Error(detail || 'Failed to start checkout');
                }

                if (!data?.success) {
                    throw new Error(data?.error || 'Failed to start checkout');
                }

                window.location.href = data.url;
            } catch (err) {
                console.error('Checkout error:', err);
                errorEl.textContent = err.message || 'Something went wrong. Please try again.';
                errorEl.style.display = 'block';
                btn.disabled = false;
                btn.innerHTML = `
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
                        <rect x="1" y="4" width="22" height="16" rx="2" ry="2"/>
                        <line x1="1" y1="10" x2="23" y2="10"/>
                    </svg>
                    Proceed to Checkout
                `;
            }
        }
    </script>
</body>
</html>
