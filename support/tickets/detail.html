<!DOCTYPE html>

    <meta charset="UTF-8">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=DM+Sans:wght@400;500;600;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">

<body class="audaz-body">

            <div class="header-grid">

                </a>
                <nav class="nav">
                    <ul class="nav-menu">
                        <li><a href="/support/dashboard.html" class="nav-link">Dashboard</a></li>
                        <li><a href="/support/tickets/index.html" class="nav-link active">Tickets</a></li>

                        <div class="user-avatar"></div>
                        <span class="user-name">Loading...</span>

                    <span></span>

    <main>
        <!-- Page Header -->
        <section class="dashboard-header dashboard-header-support">
            <div class="container">

                    <div class="dashboard-welcome">
                        <a href="/support/tickets/index.html" class="back-link">

                                <path d="M19 12H5M12 19l-7-7 7-7"/>
                            </svg>

                        </a>

        </section>

        <!-- Ticket Content -->

                        <!-- Comments Section -->

                            <h3 class="card-title">Comments</h3>
                            <div class="comments-thread" id="comments-thread">

                                    <p>Loading...</p>
                                </div>
                            </div>

                            <!-- Add Comment Form -->
                            <form id="comment-form" class="comment-form">
                                <div class="comment-composer">
                                    <div class="composer-avatar" id="composer-avatar" aria-hidden="true">RN</div>
                                    <div class="composer-input">
                                        <div class="comment-toolbar">
                                            <button type="button" class="toolbar-btn" data-action="attach-file" title="Attach file">
                                                <span>📎</span>
                                            </button>
                                            <button type="button" class="toolbar-btn" data-action="mention" title="Mention someone">
                                                <span>@</span>
                                            </button>
                                            <button type="button" class="toolbar-btn" data-action="emoji" title="Insert emoji">
                                                <span>😊</span>

                                        </div>
                                    </div>
                                </div>

                    <!-- Sidebar -->
                    <div class="ticket-sidebar">
                        <!-- Actions Card -->
                        <div class="ticket-card">
                            <h3 class="card-title">Actions</h3>
                            <div class="action-group">
                                <label for="status-select">Update Status</label>
                                <select id="status-select">
                                    <option value="open">Open</option>
                                    <option value="in_progress">In Progress</option>
                                    <option value="done">Done</option>
                                </select>
                                <button type="button" id="update-status-btn" class="btn btn-primary btn-small">Update</button>
                            </div>
                            <div class="action-group">
                                <label for="assign-select">Assign to</label>
                                <select id="assign-select">
                                    <option value="">Unassigned</option>
                                </select>
                                <button type="button" id="assign-btn" class="btn btn-primary btn-small">Assign</button>
                            </div>
                        </div>

                        <!-- Collaborators Card -->
                        <div class="ticket-card">
                            <h3 class="card-title">Collaborators</h3>
                            <div id="collaborators-container">
                                <div class="loading-state small">
                                    <div class="loading-spinner"></div>
                                </div>
                            </div>
                        </div>

                        <!-- Info Card -->
                        <div class="ticket-card">
                            <h3 class="card-title">Details</h3>
                            <div id="ticket-status-info">
                                <div class="loading-state small">
                                    <div class="loading-spinner"></div>
                                </div>
                            </div>
                        </div>

                        <!-- Timeline -->
                        <div class="ticket-card">
                            <h3 class="card-title">Timeline</h3>
                            <div class="timeline" id="ticket-timeline">
                                <div class="loading-state small">

    <!-- Footer -->
    <footer class="site-footer site-footer-app">
        <div class="container">
            <div class="footer-bottom">
                <img src="../../images/66943b1c1348ffa2b811c19c_Audaz Black.png" alt="Audaz Pro" class="footer-logo-img">
            </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../../js/supabase-config.js"></script>
    <script src="../../js/services/auth.service.js"></script>
    <script src="../../js/services/tickets.service.js"></script>
    <script src="../../js/services/comments.service.js"></script>
    <script src="../../js/services/invitations.service.js"></script>
    <script src="../../js/services/collaborators.service.js"></script>
    <script src="../../js/services/email.service.js"></script>
    <script src="../../js/components/ui.components.js"></script>
    <script src="../../js/components/auth-guard.js"></script>
    <script>
        const EMOJI_LIST = ['😀','😄','😉','😍','👍','🤝','📎','📝','✨','🚀','🧠','🎯'];
        let currentTicket = null;
        let currentProfile = null;
        let pendingAttachments = [];
        let mentionableUsers = [];
        let supportAgents = [];
        let ticketCollaborators = [];
        let commentEditor = null;
        let mentionPanelElement = null;
        let emojiPanelElement = null;
        let attachmentsPreviewElement = null;
        let attachmentInputElement = null;
        let commentsEnabled = true;
        let commentFormElement = null;
        let commentSubmitButton = null;
        let commentToolbarButtons = [];
        let commentDisabledNote = null;
        let realtimeChannels = [];

        // Priority to deadline days mapping
        const PRIORITY_DEADLINE_DAYS = {
            'urgente': 2,      // 48 hours
            'alta': 3,         // 72 hours
            'media': 7,        // 7 days
            'baixa': 14        // 14 days
        };

        function calculateDeadline(createdAt, priority) {
            const created = new Date(createdAt);
            const days = PRIORITY_DEADLINE_DAYS[priority] || 7;
            const deadline = new Date(created);
            deadline.setDate(deadline.getDate() + days);
            return deadline;
        }

        function formatDeadlineDate(date) {
            const options = { year: 'numeric', month: 'long', day: 'numeric' };
            return date.toLocaleDateString('en-US', options);
        }

        function getDeadlineStatus(deadline) {
            const now = new Date();
            const diffTime = deadline - now;
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

            if (diffDays < 0) {
                return { status: 'overdue', label: 'Overdue', daysText: `${Math.abs(diffDays)} day${Math.abs(diffDays) !== 1 ? 's' : ''} overdue` };
            } else if (diffDays === 0) {
                return { status: 'due-soon', label: 'Due Today', daysText: 'Due today' };
            } else if (diffDays <= 2) {
                return { status: 'due-soon', label: 'Due Soon', daysText: `${diffDays} day${diffDays !== 1 ? 's' : ''} left` };
            } else {
                return { status: 'on-track', label: 'On Track', daysText: `${diffDays} days left` };
            }
        }

        document.addEventListener('DOMContentLoaded', async function() {
            // Auth guard
            currentProfile = await AuthGuard.init({
                requiredRoles: ['support_agent', 'support_admin'],
                redirectTo: '/support/index.html'
            });

            if (!currentProfile) return;

            // Update UI
            AuthGuard.updateUserInfo(currentProfile);
            AuthGuard.setupLogoutButton();

            // Mobile menu
            const mobileToggle = document.querySelector('.mobile-toggle');
            const nav = document.querySelector('.nav');
            if (mobileToggle && nav) {
                mobileToggle.addEventListener('click', () => nav.classList.toggle('active'));
            }

            // Get ticket ID from URL
            const params = new URLSearchParams(window.location.search);
            const ticketId = params.get('id');

            if (!ticketId) {
                UIComponents.showError('Ticket not found');
                window.location.href = '/support/tickets/index.html';
                return;
            }

            // Setup composer
            setupCommentComposer(currentProfile);

            // Load support agents for assignment
            await loadSupportAgents();

            // Load ticket and associated context
            await loadTicket(ticketId);
            await loadOrganizationMembers(currentTicket.organization?.id);
            await loadCollaborators(ticketId);
            await loadComments(ticketId);
            await loadTimeline(ticketId);
            setupRealtimeListeners(ticketId);

            // Setup actions
            setupActions();
        });

        async function loadSupportAgents() {
            const result = await TicketsService.getSupportAgents();
            if (result.success) {
                supportAgents = result.agents || [];
                const select = document.getElementById('assign-select');
                result.agents.forEach(agent => {
                    const option = document.createElement('option');
                    option.value = agent.id;
                    option.textContent = agent.full_name;
                    select.appendChild(option);
                });
            }
        }

        async function loadTicket(ticketId) {
            const result = await TicketsService.getById(ticketId);

            if (!result.success) {
                UIComponents.showError(result.error);
                return;
            }

            currentTicket = result.ticket;
            document.title = `${currentTicket.title} - Audaz Pro Support`;
            document.getElementById('ticket-title').textContent = currentTicket.title;
            document.getElementById('ticket-org').textContent = currentTicket.organization?.name || 'Unknown organization';

            // Set current status in select
            document.getElementById('status-select').value = currentTicket.status;

            // Set current assignee in select
            if (currentTicket.assigned_to) {
                document.getElementById('assign-select').value = currentTicket.assigned_to;
            }

            // Render ticket info
            const infoContainer = document.getElementById('ticket-info');
            infoContainer.innerHTML = `
                <div class="ticket-meta-row">
                    ${UIComponents.createTypeBadge(currentTicket.type)}
                    ${UIComponents.createPriorityBadge(currentTicket.priority)}
                    ${UIComponents.createStatusBadge(currentTicket.status)}
                </div>
                <div class="ticket-description">
                    <h3>Description</h3>
                    <p>${UIComponents.escapeHtml(currentTicket.description).replace(/\n/g, '<br>')}</p>
                </div>
                ${currentTicket.category ? `
                    <div class="ticket-field">
                        <span class="field-label">URL:</span>
                        <span class="field-value">${UIComponents.escapeHtml(currentTicket.category)}</span>
                    </div>
                ` : ''}
                ${renderTicketAttachments(currentTicket)}
            `;

            // Calculate deadline
            const deadline = calculateDeadline(currentTicket.created_at, currentTicket.priority);
            const deadlineStatus = getDeadlineStatus(deadline);
            const isCompleted = currentTicket.status === 'done';
            updateCommentComposerState(!isCompleted);

            // Render status sidebar
            const statusContainer = document.getElementById('ticket-status-info');
            statusContainer.innerHTML = `
                ${!isCompleted ? `
                    <div class="expected-completion">
                        <span class="field-label">Deadline:</span>
                        <span class="expected-completion-date">${formatDeadlineDate(deadline)}</span>
                        <span class="expected-completion-status deadline-badge ${deadlineStatus.status}">${deadlineStatus.status === 'overdue' ? '⚠️ ' : ''}${deadlineStatus.daysText}</span>
                    </div>
                ` : ''}
                <div class="info-field">
                    <span class="field-label">Organization:</span>
                    <span class="field-value">${UIComponents.escapeHtml(currentTicket.organization?.name || 'Unknown')}</span>
                </div>
                <div class="info-field">
                    <span class="field-label">Created by:</span>
                    <span class="field-value">${UIComponents.escapeHtml(currentTicket.creator?.full_name || 'Unknown')}</span>
                </div>
                <div class="info-field">
                    <span class="field-label">Created on:</span>
                    <span class="field-value">${UIComponents.formatDate(currentTicket.created_at, { relative: false })}</span>
                </div>
                <div class="info-field">
                    <span class="field-label">Assignee:</span>
                    <span class="field-value">${currentTicket.assignee ? UIComponents.escapeHtml(currentTicket.assignee.full_name) : '<span class="muted">Unassigned</span>'}</span>
                </div>
                <div class="info-field">
                    <span class="field-label">Last activity:</span>
                    <span class="field-value">${UIComponents.formatDate(currentTicket.last_activity_at)}</span>
                </div>
            `;
        }

        async function loadOrganizationMembers(orgId) {
            if (!orgId) {
                mentionableUsers = [];
                populateMentionPanel();
                return;
            }

            const result = await TicketsService.getOrganizationMembers(orgId);
            if (result.success) {
                mentionableUsers = result.members;
            } else {
                mentionableUsers = [];
            }

            populateMentionPanel();
        }

        async function loadCollaborators(ticketId) {
            const container = document.getElementById('collaborators-container');
            const result = await CollaboratorsService.getByTicketId(ticketId);

            if (!result.success) {
                container.innerHTML = '<p class="error-message">Error loading collaborators</p>';
                return;
            }

            ticketCollaborators = result.collaborators || [];

            // Get available users (org members + support agents not already collaborators)
            const collaboratorIds = new Set(ticketCollaborators.map(c => c.user_id));

            // Combine org members and support agents, marking their source
            const orgUsers = mentionableUsers.map(u => ({ ...u, group: 'Organization' }));
            const supportUsers = supportAgents.map(u => ({ ...u, group: 'Support Team' }));

            // Combine and filter out existing collaborators
            const allUsers = [...orgUsers, ...supportUsers];
            const seenIds = new Set();
            const availableUsers = allUsers.filter(u => {
                if (collaboratorIds.has(u.id) || seenIds.has(u.id)) return false;
                seenIds.add(u.id);
                return true;
            });

            container.innerHTML = UIComponents.createCollaboratorsCard(ticketCollaborators, {
                canAdd: true,
                canRemove: true,
                availableUsers
            });

            setupCollaboratorActions();
        }

        function setupCollaboratorActions() {
            // Add collaborator
            const addBtn = document.getElementById('add-collaborator-btn');
            if (addBtn) {
                addBtn.addEventListener('click', async () => {
                    const select = document.getElementById('add-collaborator-select');
                    const userId = select.value;
                    if (!userId) {
                        UIComponents.showWarning('Please select a user');
                        return;
                    }

                    UIComponents.setButtonLoading(addBtn, true);
                    const result = await CollaboratorsService.add(currentTicket.id, userId);

                    if (result.success) {
                        UIComponents.showSuccess('Collaborator added');
                        await loadCollaborators(currentTicket.id);
                    } else {
                        UIComponents.showError(result.error);
                    }

                    UIComponents.setButtonLoading(addBtn, false);
                });
            }

            // Remove collaborator
            document.querySelectorAll('.collaborator-remove').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const userId = e.currentTarget.dataset.userId;
                    if (!confirm('Remove this collaborator? They will no longer receive notifications.')) {
                        return;
                    }

                    const result = await CollaboratorsService.remove(currentTicket.id, userId);

                    if (result.success) {
                        UIComponents.showSuccess('Collaborator removed');
                        await loadCollaborators(currentTicket.id);
                    } else {
                        UIComponents.showError(result.error);
                    }
                });
            });
        }

        async function loadComments(ticketId) {
            const container = document.getElementById('comments-thread');
            const result = await CommentsService.getByTicketId(ticketId);

            if (!result.success) {
                container.innerHTML = '<p class="error-message">Error loading comments</p>';
                return;
            }

            if (result.comments.length === 0) {
                container.innerHTML = '<p class="no-comments">No comments yet.</p>';
                return;
            }

            container.innerHTML = result.comments
                .map(comment => UIComponents.createCommentItem(comment, {
                    context: { mentionableUsers }
                }))
                .join('');
        }

        let allTimelineEvents = [];
        let timelineDisplayCount = 4;

        async function loadTimeline(ticketId) {
            const container = document.getElementById('ticket-timeline');
            const result = await CommentsService.getEventsByTicketId(ticketId);

            if (!result.success) {
                container.innerHTML = '<p class="error-message">Error loading history</p>';
                return;
            }

            if (result.events.length === 0) {
                container.innerHTML = '<p class="no-events">No events recorded</p>';
                return;
            }

            // Sort events by date (newest first)
            allTimelineEvents = [...result.events].sort((a, b) =>
                new Date(b.created_at) - new Date(a.created_at)
            );

            // Reset display count
            timelineDisplayCount = 4;
            renderTimeline();
        }

        function renderTimeline() {
            const container = document.getElementById('ticket-timeline');
            const eventsToShow = allTimelineEvents.slice(0, timelineDisplayCount);
            const hasMore = allTimelineEvents.length > timelineDisplayCount;

            let html = eventsToShow
                .map(event => UIComponents.createTimelineEvent(event))
                .join('');

            if (hasMore) {
                const remaining = allTimelineEvents.length - timelineDisplayCount;
                html += `
                    <button type="button" class="timeline-load-more" id="timeline-load-more">
                        Show more (${remaining} more)
                    </button>
                `;
            }

            container.innerHTML = html;

            // Setup load more button
            const loadMoreBtn = document.getElementById('timeline-load-more');
            if (loadMoreBtn) {
                loadMoreBtn.addEventListener('click', () => {
                    timelineDisplayCount += 4;
                    renderTimeline();
                });
            }
        }

        function setupActions() {
            // Update status
            document.getElementById('update-status-btn').addEventListener('click', async () => {
                const btn = document.getElementById('update-status-btn');
                const status = document.getElementById('status-select').value;

                if (status === currentTicket.status) {
                    UIComponents.showWarning('This ticket already has that status');
                    return;
                }

                UIComponents.setButtonLoading(btn, true);

                const oldStatus = currentTicket.status;
                const result = await TicketsService.updateStatus(currentTicket.id, status);

                if (result.success) {
                    UIComponents.showSuccess('Status updated!');

                    // Notify client about status change (async)
                    notifyStatusChange(oldStatus, status);

                    await loadTicket(currentTicket.id);
                    await loadTimeline(currentTicket.id);
                } else {
                    UIComponents.showError(result.error);
                }

                UIComponents.setButtonLoading(btn, false);
            });

            // Assign ticket
            document.getElementById('assign-btn').addEventListener('click', async () => {
                const btn = document.getElementById('assign-btn');
                const assigneeId = document.getElementById('assign-select').value;

                if (!assigneeId) {
                    UIComponents.showWarning('Please select an assignee');
                    return;
                }

                if (assigneeId === currentTicket.assigned_to) {
                    UIComponents.showWarning('This ticket is already assigned to that user');
                    return;
                }

                UIComponents.setButtonLoading(btn, true);

                const result = await TicketsService.assign(currentTicket.id, assigneeId);

                if (result.success) {
                    UIComponents.showSuccess('Ticket assigned!');

                    // Notify the assigned technician (async)
                    notifyAssignedTechnician(assigneeId);

                    await loadTicket(currentTicket.id);
                    await loadTimeline(currentTicket.id);
                } else {
                    UIComponents.showError(result.error);
                }

                UIComponents.setButtonLoading(btn, false);
            });
        }

        async function uploadCommentAttachments(ticketId) {
            if (pendingAttachments.length === 0) {
                return { attachments: [], failedUploads: [] };
            }

            const supabaseClient = AudazSupabase.getClient();
            if (!supabaseClient?.storage) {
                console.error('Supabase storage client not available');
                return { attachments: [], failedUploads: pendingAttachments.map(f => ({ name: f.name, error: 'Storage not available' })) };
            }

            const uploadedUrls = [];
            const failedUploads = [];

            for (const attachment of pendingAttachments) {
                const file = attachment.file;
                if (!file) {
                    failedUploads.push({ name: attachment.name, error: 'No file data' });
                    continue;
                }

                const fileExt = file.name.split('.').pop();
                const fileName = `${ticketId}/comments/${Date.now()}_${Math.random().toString(36).substr(2, 9)}.${fileExt}`;

                try {
                    console.log(`Uploading file: ${fileName}`);
                    const { data: uploadData, error: uploadError } = await supabaseClient.storage
                        .from('ticket-attachments')
                        .upload(fileName, file);

                    if (uploadError) {
                        console.error('Upload error:', uploadError);
                        failedUploads.push({ name: file.name, error: uploadError.message });
                        continue;
                    }

                    const { data: urlData } = supabaseClient.storage
                        .from('ticket-attachments')
                        .getPublicUrl(fileName);

                    if (urlData?.publicUrl) {
                        uploadedUrls.push({
                            name: file.name,
                            url: urlData.publicUrl,
                            type: file.type,
                            size: file.size
                        });
                        console.log(`Upload successful: ${urlData.publicUrl}`);
                    } else {
                        failedUploads.push({ name: file.name, error: 'Could not get public URL' });
                    }
                } catch (e) {
                    console.error('Upload exception:', e);
                    failedUploads.push({ name: file.name, error: e.message });
                }
            }

            return { attachments: uploadedUrls, failedUploads };
        }

        async function handleCommentSubmit(e) {
            e.preventDefault();
            const form = e.target;
            const btn = form.querySelector('button[type="submit"]');

            if (!commentsEnabled) {
                UIComponents.showWarning('This ticket is closed and no longer accepts comments.');
                return;
            }
            const rawBody = (form.body.value || '').trim();
            const hasText = Boolean(rawBody);
            const hasAttachments = pendingAttachments.length > 0;

            if (!hasText && !hasAttachments) {
                UIComponents.showError('Please write a comment or add an attachment');
                return;
            }

            UIComponents.setButtonLoading(btn, true);

            let finalBody = rawBody;

            // Upload attachments first if any
            if (hasAttachments) {
                try {
                    const uploadResult = await uploadCommentAttachments(currentTicket.id);

                    if (uploadResult.failedUploads.length > 0) {
                        const failedNames = uploadResult.failedUploads.map(f => f.name).join(', ');
                        console.error('Failed uploads:', uploadResult.failedUploads);
                        UIComponents.showError(`Failed to upload: ${failedNames}`);
                    }

                    // Add successfully uploaded attachments to comment body
                    if (uploadResult.attachments.length > 0) {
                        const attachmentLines = uploadResult.attachments
                            .map(att => `📎 [${att.name}](${att.url}) (${formatFileSize(att.size)})`)
                            .join('\n');
                        finalBody = rawBody ? `${rawBody}\n\n${attachmentLines}` : attachmentLines;
                    }
                } catch (uploadError) {
                    console.error('Comment attachment upload error:', uploadError);
                    UIComponents.showError('Failed to upload attachments. Please try again.');
                    UIComponents.setButtonLoading(btn, false);
                    return;
                }
            }

            const result = await CommentsService.add(currentTicket.id, finalBody);

            if (result.success) {
                UIComponents.showSuccess('Comment added!');
                form.reset();
                pendingAttachments = [];
                if (attachmentInputElement) {
                    attachmentInputElement.value = '';
                }
                renderAttachmentPreview();
                updateNotificationText();
                closeMentionPanel();
                closeEmojiPanel();
                await loadComments(currentTicket.id);
                await loadCollaborators(currentTicket.id); // Reload collaborators (mentions may add new ones)
                await loadTimeline(currentTicket.id);

                // Notify ticket creator about new comment from support (async)
                notifyClientAboutComment(finalBody);
            } else {
                UIComponents.showError(result.error);
            }

            UIComponents.setButtonLoading(btn, false);
        }

        // Notify assigned technician about ticket assignment
        async function notifyAssignedTechnician(assigneeId) {
            try {
                if (!currentTicket || !assigneeId) return;

                const client = AudazSupabase.getClient();

                // Get assignee's email using RPC function
                const { data: assigneeData, error } = await client.rpc('get_user_email', {
                    user_id: assigneeId
                });

                if (error || !assigneeData) {
                    console.warn('Could not get assignee email:', error);
                    return;
                }

                const assigneeEmail = assigneeData;
                const orgName = currentTicket.organization?.name || 'Organization';

                if (assigneeEmail) {
                    await EmailService.sendTicketNotification({
                        type: 'ticket_assigned',
                        to: [assigneeEmail],
                        ticketId: currentTicket.id,
                        ticketTitle: currentTicket.title,
                        orgName: orgName,
                        ticketUrl: `${window.location.origin}/support/tickets/detail.html?id=${currentTicket.id}`,
                        assignedBy: currentProfile?.full_name || 'Support Team'
                    });
                    console.log('Assigned technician notified');
                }
            } catch (err) {
                console.error('Failed to notify assigned technician:', err);
            }
        }

        // Notify ticket creator about status change
        async function notifyStatusChange(oldStatus, newStatus) {
            try {
                if (!currentTicket) return;

                const creatorEmail = currentTicket.created_by_email || null;
                const orgName = currentTicket.org_name || 'Your Organization';

                if (creatorEmail) {
                    await EmailService.sendTicketNotification({
                        type: 'ticket_status_changed',
                        to: [creatorEmail],
                        ticketId: currentTicket.id,
                        ticketTitle: currentTicket.title,
                        orgName: orgName,
                        ticketUrl: `${window.location.origin}/client/tickets/detail.html?id=${currentTicket.id}`,
                        oldStatus: oldStatus,
                        newStatus: newStatus
                    });
                    console.log('Client notified about status change');
                }
            } catch (err) {
                console.error('Failed to notify about status change:', err);
            }
        }

        // Notify ticket creator about comment from support
        async function notifyClientAboutComment(commentBody) {
            try {
                if (!currentTicket || !currentTicket.created_by) return;

                const client = AudazSupabase.getClient();

                // Get ticket creator's email
                const { data: creatorProfile } = await client
                    .from('profiles')
                    .select('id, full_name')
                    .eq('id', currentTicket.created_by)
                    .single();

                if (!creatorProfile) return;

                // Get email from auth.users (we need RPC for this)
                // For now use a placeholder - you'd need to get this from the ticket data or a join
                const creatorEmail = currentTicket.created_by_email || null;

                // Get organization name
                let orgName = currentTicket.org_name || 'Your Organization';

                if (creatorEmail) {
                    await EmailService.sendTicketNotification({
                        type: 'ticket_comment',
                        to: [creatorEmail],
                        ticketId: currentTicket.id,
                        ticketTitle: currentTicket.title,
                        orgName: orgName,
                        ticketUrl: `${window.location.origin}/client/tickets/detail.html?id=${currentTicket.id}`,
                        commentBy: currentProfile?.full_name || 'Support Team',
                        commentPreview: commentBody.substring(0, 200)
                    });
                    console.log('Client notified about support comment');
                }
            } catch (err) {
                console.error('Failed to notify client about comment:', err);
            }
        }

        function setupCommentComposer(profile) {
            const avatar = document.getElementById('composer-avatar');
            if (avatar && profile) {
                avatar.textContent = UIComponents.getInitials(profile.full_name);
            }

            const form = document.getElementById('comment-form');
            commentFormElement = form;
            commentSubmitButton = form?.querySelector('button[type="submit"]');
            commentToolbarButtons = Array.from(form?.querySelectorAll('.comment-toolbar button') || []);
            commentEditor = document.getElementById('comment-body');
            mentionPanelElement = document.getElementById('mention-panel');
            emojiPanelElement = document.getElementById('emoji-panel');
            attachmentsPreviewElement = document.getElementById('attachment-preview');
            attachmentInputElement = document.getElementById('attachment-input');

            form?.addEventListener('submit', handleCommentSubmit);
            commentEditor?.addEventListener('input', updateNotificationText);
            attachmentInputElement?.addEventListener('change', handleFileSelection);

            // Open mention panel when user types @
            commentEditor?.addEventListener('input', (e) => {
                const value = e.target.value;
                const cursorPos = e.target.selectionStart;
                // Check if user just typed @ (the character before cursor is @)
                if (cursorPos > 0 && value[cursorPos - 1] === '@') {
                    mentionPanelElement?.classList.add('is-open');
                }
            });

            // Handle paste event for images
            commentEditor?.addEventListener('paste', (e) => {
                const items = e.clipboardData?.items;
                if (!items) return;

                for (const item of items) {
                    if (item.type.startsWith('image/')) {
                        e.preventDefault();
                        const file = item.getAsFile();
                        if (file) {
                            // Generate a name for the pasted image
                            const extension = file.type.split('/')[1] || 'png';
                            const fileName = `pasted-image-${Date.now()}.${extension}`;

                            pendingAttachments.push({
                                id: `${Date.now()}-${Math.random()}`,
                                name: fileName,
                                size: file.size,
                                type: file.type,
                                file: new File([file], fileName, { type: file.type })
                            });

                            renderAttachmentPreview();
                            updateNotificationText();
                            UIComponents.showSuccess('Image pasted');
                        }
                        break;
                    }
                }
            });

            document.querySelector('[data-action="attach-file"]')?.addEventListener('click', () => {
                attachmentInputElement?.click();
            });

            document.querySelector('[data-action="mention"]')?.addEventListener('click', () => {
                mentionPanelElement?.classList.toggle('is-open');
            });

            document.querySelector('[data-action="emoji"]')?.addEventListener('click', () => {
                const opened = emojiPanelElement?.classList.toggle('is-open');
                if (opened) {
                    populateEmojiPanel();
                }
            });

            attachmentsPreviewElement?.addEventListener('click', event => {
                const removeButton = event.target.closest('.chip-remove');
                if (!removeButton) return;
                const index = Number(removeButton.dataset.index);
                if (!Number.isNaN(index)) {
                    pendingAttachments.splice(index, 1);
                    renderAttachmentPreview();
                    updateNotificationText();
                }
            });

            if (mentionPanelElement) {
                mentionPanelElement.addEventListener('click', event => {
                    const item = event.target.closest('.mention-item');
                    if (!item) return;
                    insertMention({
                        id: item.dataset.userId,
                        full_name: item.dataset.userName
                    });
                    mentionPanelElement.classList.remove('is-open');
                });
            }

            document.addEventListener('click', event => {
                if (mentionPanelElement && !event.target.closest('.mention-panel') && !event.target.closest('[data-action="mention"]')) {
                    mentionPanelElement.classList.remove('is-open');
                }
                if (emojiPanelElement && !event.target.closest('.emoji-panel') && !event.target.closest('[data-action="emoji"]')) {
                    emojiPanelElement.classList.remove('is-open');
                }
            });

            populateEmojiPanel();
            updateNotificationText();
            renderAttachmentPreview();
            populateMentionPanel();
            updateCommentComposerState(commentsEnabled);
        }

        function handleFileSelection(event) {
            const files = Array.from(event.target.files || []);
            files.forEach(file => {
                pendingAttachments.push({
                    id: `${Date.now()}-${Math.random()}`,
                    name: file.name,
                    size: file.size,
                    type: file.type,
                    file
                });
            });
            if (attachmentInputElement) {
                attachmentInputElement.value = '';
            }
            renderAttachmentPreview();
            updateNotificationText();
        }

        function updateNotificationText() {
            if (!commentEditor) return;
            const matches = commentEditor.value.match(/@\[[^\]]+\]/g) || [];
            const uniqueCount = new Set(matches).size;
            const notificationEl = document.getElementById('comment-notification-text');
            if (!notificationEl) return;
            const parts = [];
            parts.push(`${uniqueCount} ${uniqueCount === 1 ? 'person will be' : 'people will be'} notified`);
            if (pendingAttachments.length) {
                parts.push(`${pendingAttachments.length} ${pendingAttachments.length === 1 ? 'attachment' : 'attachments'}`);
            }
            notificationEl.textContent = parts.join(' • ');
        }

        function insertMention(user) {
            if (!commentEditor || !user) return;

            // Check if there's already an @ before cursor and remove it
            const cursorPos = commentEditor.selectionStart || 0;
            const value = commentEditor.value || '';

            if (cursorPos > 0 && value[cursorPos - 1] === '@') {
                // Remove the @ that was typed
                commentEditor.value = value.slice(0, cursorPos - 1) + value.slice(cursorPos);
                commentEditor.setSelectionRange(cursorPos - 1, cursorPos - 1);
            }

            const mentionToken = `@${user.full_name} `;
            insertAtCursor(commentEditor, mentionToken);
            commentEditor.focus();
            updateNotificationText();
        }

        function insertAtCursor(textarea, text) {
            if (!textarea) return;
            const start = textarea.selectionStart || 0;
            const end = textarea.selectionEnd || 0;
            const value = textarea.value || '';
            textarea.value = `${value.slice(0, start)}${text}${value.slice(end)}`;
            const cursor = start + text.length;
            textarea.setSelectionRange(cursor, cursor);
            textarea.dispatchEvent(new Event('input'));
        }

        function renderAttachmentPreview() {
            if (!attachmentsPreviewElement) return;
            attachmentsPreviewElement.innerHTML = pendingAttachments
                .map((file, index) => `
                    <span class="attachment-chip">
                        <span class="chip-text">${UIComponents.escapeHtml(file.name)}</span>
                        <span class="chip-size">${formatFileSize(file.size)}</span>
                        <button type="button" class="chip-remove" data-index="${index}" aria-label="Remove attachment">×</button>
                    </span>
                `)
                .join('');
        }

        function formatFileSize(bytes) {
            if (!bytes || bytes === 0) return '0 B';
            const units = ['B', 'KB', 'MB', 'GB'];
            const exponent = Math.min(units.length - 1, Math.floor(Math.log(bytes) / Math.log(1024)));
            const value = bytes / Math.pow(1024, exponent);
            return `${value.toFixed(1)} ${units[exponent]}`;
        }

        function populateMentionPanel() {
            if (!mentionPanelElement) return;
            if (!mentionableUsers.length) {
            mentionPanelElement.innerHTML = '<p class="mention-empty">No members available</p>';
                return;
            }

            mentionPanelElement.innerHTML = mentionableUsers
                .map(user => `
                    <div class="mention-item" data-user-id="${user.id}" data-user-name="${UIComponents.escapeHtml(user.full_name)}">
                        <div class="mention-avatar">${UIComponents.getInitials(user.full_name)}</div>
                        <div>
                            <div class="mention-name">${UIComponents.escapeHtml(user.full_name)}</div>
                            <div class="mention-role">${UIComponents.escapeHtml(user.role || 'Colaborador')}</div>
                        </div>
                    </div>
                `)
                .join('');
        }

        function populateEmojiPanel() {
            if (!emojiPanelElement) return;
            emojiPanelElement.innerHTML = EMOJI_LIST
                .map(emoji => `<button type="button" class="emoji-item" data-emoji="${emoji}" aria-label="${emoji}">${emoji}</button>`)
                .join('');

            emojiPanelElement.querySelectorAll('.emoji-item').forEach(button => {
                button.addEventListener('click', () => {
                    insertAtCursor(commentEditor, `${button.dataset.emoji} `);
                    closeEmojiPanel();
                    commentEditor?.focus();
                    updateNotificationText();
                });
            });
        }

        function closeMentionPanel() {
            if (mentionPanelElement) {
                mentionPanelElement.classList.remove('is-open');
            }
        }

        function closeEmojiPanel() {
            if (emojiPanelElement) {
                emojiPanelElement.classList.remove('is-open');
            }
        }

        function updateCommentComposerState(enabled) {
            commentsEnabled = enabled;
            if (commentEditor) {
                commentEditor.disabled = !enabled;
            }
            if (attachmentInputElement) {
                attachmentInputElement.disabled = !enabled;
            }
            if (commentSubmitButton) {
                commentSubmitButton.disabled = !enabled;
                commentSubmitButton.textContent = enabled ? 'Comment' : 'Ticket closed';
            }
            commentToolbarButtons.forEach(btn => {
                btn.disabled = !enabled;
            });
            if (commentFormElement) {
                commentFormElement.classList.toggle('is-disabled', !enabled);
                if (!enabled && !commentDisabledNote) {
                    commentDisabledNote = document.createElement('p');
                    commentDisabledNote.className = 'comment-disabled-note';
                    commentDisabledNote.textContent = 'This ticket is closed and cannot accept new comments.';
                    commentFormElement.appendChild(commentDisabledNote);
                } else if (enabled && commentDisabledNote) {
                    commentDisabledNote.remove();
                    commentDisabledNote = null;
                }
            }
        }

        function setupRealtimeListeners(ticketId) {
            if (!ticketId) return;
            cleanupRealtimeListeners();

            const client = AudazSupabase.getClient();
            if (!client || typeof client.channel !== 'function') return;

            const commentChannel = client.channel(`ticket-comments-${ticketId}`)
                .on('postgres_changes', {
                    event: '*',
                    schema: 'public',
                    table: 'ticket_comments',
                    filter: `ticket_id=eq.${ticketId}`
                }, () => {
                    loadComments(ticketId);
                    loadCollaborators(ticketId);
                })
                .subscribe();

            realtimeChannels.push(commentChannel);

            const eventChannel = client.channel(`ticket-events-${ticketId}`)
                .on('postgres_changes', {
                    event: '*',
                    schema: 'public',
                    table: 'ticket_events',
                    filter: `ticket_id=eq.${ticketId}`
                }, (payload) => {
                    loadTimeline(ticketId);
                    const eventRecord = payload?.new || payload?.record;
                    const eventType = eventRecord?.event_type;
                    if (eventType && eventType !== 'commented') {
                        loadTicket(ticketId);
                    }
                })
                .subscribe();

            realtimeChannels.push(eventChannel);
        }

        function cleanupRealtimeListeners() {
            const client = AudazSupabase.getClient();
            if (!client) {
                realtimeChannels = [];
                return;
            }

            realtimeChannels.forEach(channel => {
                if (!channel) return;
                if (typeof client.removeChannel === 'function') {
                    client.removeChannel(channel);
                } else if (typeof channel.unsubscribe === 'function') {
                    channel.unsubscribe();
                }
            });

            realtimeChannels = [];
        }

        window.addEventListener('beforeunload', cleanupRealtimeListeners);

        function renderTicketAttachments(ticket) {
            // Check for attachments array (new format)
            if (ticket.attachments && Array.isArray(ticket.attachments) && ticket.attachments.length > 0) {
                return `
                    <div class="ticket-attachments">
                        <h3>Attachments</h3>
                        <div class="attachments-grid">
                            ${ticket.attachments.map(att => renderAttachmentItem(att)).join('')}
                        </div>
                    </div>
                `;
            }

            // Fallback to single attachment_url (old format)
            if (ticket.attachment_url) {
                return `
                    <div class="ticket-attachments">
                        <h3>Attachments</h3>
                        <div class="attachments-grid">
                            <a href="${ticket.attachment_url}" target="_blank" class="attachment-item attachment-link">
                                <div class="attachment-icon other">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
                                        <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
                                    </svg>
                                </div>
                                <span class="attachment-name">View Attachment</span>
                            </a>
                        </div>
                    </div>
                `;
            }

            return '';
        }

        function renderAttachmentItem(attachment) {
            const type = attachment.type || 'other';
            const name = attachment.name || 'Attachment';
            const url = attachment.url || '';
            const size = attachment.size ? formatAttachmentSize(attachment.size) : '';

            // Check if it's an image for preview
            const isImage = type === 'image' || /\.(jpg|jpeg|png|gif|webp|svg)$/i.test(name);
            const isVideo = type === 'video' || /\.(mp4|webm|mov|avi)$/i.test(name);
            const isPdf = type === 'pdf' || /\.pdf$/i.test(name);

            let iconClass = 'other';
            let iconContent = '';

            if (isImage) {
                iconClass = 'image';
                iconContent = `<img src="${url}" alt="${UIComponents.escapeHtml(name)}" class="attachment-preview-img">`;
            } else if (isVideo) {
                iconClass = 'video';
                iconContent = `
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
                        <polygon points="5 3 19 12 5 21 5 3"/>
                    </svg>
                `;
            } else if (isPdf) {
                iconClass = 'pdf';
                iconContent = 'PDF';
            } else {
                iconClass = 'document';
                iconContent = getExtension(name);
            }

            return `
                <a href="${url}" target="_blank" class="attachment-item" title="${UIComponents.escapeHtml(name)}">
                    <div class="attachment-icon ${iconClass}">${iconContent}</div>
                    <div class="attachment-info">
                        <span class="attachment-name">${UIComponents.escapeHtml(name)}</span>
                        ${size ? `<span class="attachment-size">${size}</span>` : ''}
                    </div>
                    <div class="attachment-download">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                            <polyline points="7 10 12 15 17 10"/>
                            <line x1="12" y1="15" x2="12" y2="3"/>
                        </svg>
                    </div>
                </a>
            `;
        }

        function getExtension(filename) {
            const ext = filename.split('.').pop();
            return ext ? ext.toUpperCase().substring(0, 4) : 'FILE';
        }

        function formatAttachmentSize(bytes) {
            if (!bytes || bytes === 0) return '';
            const units = ['B', 'KB', 'MB', 'GB'];
            const exponent = Math.min(units.length - 1, Math.floor(Math.log(bytes) / Math.log(1024)));
            const value = bytes / Math.pow(1024, exponent);
            return `${value.toFixed(1)} ${units[exponent]}`;
        }
    </script>
