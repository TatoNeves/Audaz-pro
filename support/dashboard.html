<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support Dashboard - Audaz Pro</title>
    <meta name="description" content="Audaz Pro support dashboard overview">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=DM+Sans:wght@400;500;600;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/tickets.css">

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="../images/favicon.ico">
</head>
<body class="audaz-body">
    <!-- Header -->
    <header class="site-header site-header-support">
        <div class="container">
            <div class="header-grid">
                <a href="/support/dashboard.html" class="logo-link">
                    <img src="../images/Logo.svg" alt="Audaz Pro" class="logo-image">
                    <span class="header-badge">Support</span>
                </a>
                <nav class="nav">
                    <ul class="nav-menu">
                        <li><a href="/support/dashboard.html" class="nav-link active">Dashboard</a></li>
                        <li><a href="/support/tickets/index.html" class="nav-link">Tickets</a></li>
                        <li><a href="/support/organizations.html" class="nav-link">Organizations</a></li>
                    </ul>
                    <div class="user-menu">
                        <div class="user-avatar"></div>
                        <span class="user-name">Loading...</span>
                        <button class="logout-btn btn btn-secondary">Log Out</button>
                    </div>
                </nav>
                <button class="mobile-toggle" aria-label="Menu">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
            </div>
        </div>
    </header>

    <main>
        <!-- Dashboard Header -->
        <section class="dashboard-header dashboard-header-support">
            <div class="container">
                <div class="dashboard-header-content">
                    <div class="dashboard-welcome">
                        <h1>Support Dashboard</h1>
                        <p>Overview of all tickets</p>
                    </div>
                </div>
            </div>
        </section>

        <!-- Stats Section -->
        <section class="dashboard-stats">
            <div class="container">
                <div class="stats-grid" id="stats-container">
                    <div class="stats-card stats-open">
                        <div class="stats-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="12" cy="12" r="10"/>
                                <path d="M12 6v6l4 2"/>
                            </svg>
                        </div>
                        <div class="stats-content">
                            <span class="stats-value" id="stat-open">-</span>
                            <span class="stats-label">Open</span>
                        </div>
                    </div>
                    <div class="stats-card stats-progress">
                        <div class="stats-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M12 2v4m0 12v4M4.93 4.93l2.83 2.83m8.48 8.48l2.83 2.83M2 12h4m12 0h4M4.93 19.07l2.83-2.83m8.48-8.48l2.83-2.83"/>
                            </svg>
                        </div>
                        <div class="stats-content">
                            <span class="stats-value" id="stat-progress">-</span>
                            <span class="stats-label">In Progress</span>
                        </div>
                    </div>
                    <div class="stats-card stats-done">
                        <div class="stats-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                                <polyline points="22 4 12 14.01 9 11.01"/>
                            </svg>
                        </div>
                        <div class="stats-content">
                            <span class="stats-value" id="stat-done">-</span>
                            <span class="stats-label">Done</span>
                        </div>
                    </div>
                    <div class="stats-card stats-total">
                        <div class="stats-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M15 5v2m0 4v2m0 4v2M5 5a2 2 0 0 0-2 2v3a2 2 0 1 1 0 4v3a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-3a2 2 0 1 1 0-4V7a2 2 0 0 0-2-2H5z"/>
                            </svg>
                        </div>
                        <div class="stats-content">
                            <span class="stats-value" id="stat-total">-</span>
                            <span class="stats-label">Total</span>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Quick Filters -->
        <section class="quick-filters">
            <div class="container">
                <div class="quick-filter-buttons">
                    <button class="quick-filter active" data-filter="all">All</button>
                    <button class="quick-filter" data-filter="open">Open</button>
                    <button class="quick-filter" data-filter="in_progress">In Progress</button>
                    <button class="quick-filter priority-high" data-filter="alta">High Priority</button>
                </div>
            </div>
        </section>

        <!-- Recent Tickets -->
        <section class="dashboard-recent">
            <div class="container">
                <div class="section-header-row">
                    <h2>Recent Tickets</h2>
                    <a href="/support/tickets/index.html" class="btn btn-secondary">View All</a>
                </div>
                <div class="ticket-list" id="recent-tickets">
                    <div class="loading-state">
                        <div class="loading-spinner"></div>
                        <p>Loading tickets...</p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="site-footer site-footer-app">
        <div class="container">
            <div class="footer-bottom">
                <img src="../images/Logo.svg" alt="Audaz Pro" class="footer-logo-img">
            </div>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase-config.js"></script>
    <script src="../js/services/auth.service.js"></script>
    <script src="../js/services/tickets.service.js"></script>
    <script src="../js/services/comments.service.js"></script>
    <script src="../js/services/invitations.service.js"></script>
    <script src="../js/components/ui.components.js"></script>
    <script src="../js/components/auth-guard.js"></script>
    <script>
        let currentFilter = 'all';

        document.addEventListener('DOMContentLoaded', async function() {
            // Auth guard - require support roles
            const profile = await AuthGuard.init({
                requiredRoles: ['support_agent', 'support_admin'],
                redirectTo: '/support/index.html'
            });

            if (!profile) return;

            // Update UI
            AuthGuard.updateUserInfo(profile);
            AuthGuard.setupLogoutButton();

            // Mobile menu
            const mobileToggle = document.querySelector('.mobile-toggle');
            const nav = document.querySelector('.nav');
            if (mobileToggle && nav) {
                mobileToggle.addEventListener('click', () => nav.classList.toggle('active'));
            }

            // Setup quick filters
            setupQuickFilters();

            // Load stats
            loadStats();

            // Load recent tickets
            loadRecentTickets();
        });

        function setupQuickFilters() {
            const buttons = document.querySelectorAll('.quick-filter');
            buttons.forEach(btn => {
                btn.addEventListener('click', () => {
                    buttons.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentFilter = btn.dataset.filter;
                    loadRecentTickets();
                });
            });
        }

        async function loadStats() {
            const result = await TicketsService.getStats();

            if (result.success) {
                document.getElementById('stat-open').textContent = result.stats.open;
                document.getElementById('stat-progress').textContent = result.stats.in_progress;
                document.getElementById('stat-done').textContent = result.stats.done;
                document.getElementById('stat-total').textContent = result.stats.total;
            }
        }

        async function loadRecentTickets() {
            const container = document.getElementById('recent-tickets');
            UIComponents.showLoading(container, 'Loading tickets...');

            const filters = { limit: 10 };

            if (currentFilter === 'open') {
                filters.status = 'open';
            } else if (currentFilter === 'in_progress') {
                filters.status = 'in_progress';
            } else if (currentFilter === 'alta') {
                filters.priority = 'alta';
            }

            const result = await TicketsService.list(filters);

            if (!result.success) {
                UIComponents.showError(result.error);
                container.innerHTML = '<p class="error-message">Error loading tickets</p>';
                return;
            }

            if (result.tickets.length === 0) {
                UIComponents.showEmptyState(container, {
                    icon: 'ticket',
                    title: 'No tickets found',
                    message: currentFilter === 'all'
                        ? 'No tickets are in the system yet.'
                        : 'No tickets match the selected filters.'
                });
                return;
            }

            container.innerHTML = result.tickets
                .map(ticket => UIComponents.createTicketListItem(ticket, { isSupport: true, showOrg: true }))
                .join('');
        }
    </script>
</body>
</html>
